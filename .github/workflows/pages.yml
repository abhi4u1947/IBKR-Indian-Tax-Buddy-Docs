# GitHub Pages deploy for the IBKR Indian Tax Assistant docs site.
# This workflow lives in the PUBLIC docs repo (abhi4u1947/IBKR-Indian-Tax-Buddy-Docs).
# Because that repo is public, the workflow token can enable Pages and publish to
# https://abhi4u1947.github.io/IBKR-Indian-Tax-Buddy-Docs/ with no extra secrets.
name: Docs site (MkDocs → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --clean

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
