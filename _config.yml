# Jekyll configuration for the IBKR Indian Tax Buddy documentation site.
title: IBKR Indian Tax Buddy
description: >-
  Documentation for IBKR Indian Tax Buddy — a tool that helps Indian
  residents prepare their income-tax figures from Interactive Brokers (IBKR)
  account statements.
theme: just-the-docs

# Site URL settings. The site is served from a project page, so it lives
# under the repository name. These are overridden at build time by the
# Pages workflow, but kept here for local builds.
url: https://abhi4u1947.github.io
baseurl: /IBKR-Indian-Tax-Buddy-Docs

# just-the-docs options
search_enabled: true
heading_anchors: true
color_scheme: light

aux_links:
  "Project repository":
    - "https://github.com/abhi4u1947/IBKR-Indian-Tax-Buddy"
aux_links_new_tab: true

footer_content: >-
  IBKR Indian Tax Buddy is an aid for preparing tax figures and is not a
  substitute for professional tax advice. Verify all numbers before filing.

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .github
